packages:
  - 'apps/*'
  - 'tools/*'
  - 'packages/*'
  - 'packages/channels/*'

catalog:
  '@biomejs/biome': '2.4.4'
  '@types/node': '24.10.4'
  oxlint: '^1.50.0'
  typescript: '5.9.3'

onlyBuiltDependencies:
  - better-sqlite3
  - sharp
  - bcrypt
  - electron

packageExtensions:
  sharp:
    dependencies:
      node-addon-api: '*'
      node-gyp: '*'
  bcrypt:
    dependencies:
      node-addon-api: '*'
      node-gyp: '*'
  better-sqlite3:
    dependencies:
      node-addon-api: '*'
      node-gyp: '*'
